{% extends "base.html" %}

{% block content %}

<h2>Top Influencers</h2>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Rank</th>
            <th>Username</th>
            <th>Score</th>
        </tr>
    </thead>
    <tbody>
        {% for r in results %}
        <tr>
            <td>{{ r.rank }}</td>
            <td>{{ r.username }}</td>
            <td>{{ r.score }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
