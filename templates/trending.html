{% extends 'base.html' %}
{% block content %}
<h3>Trending Topics</h3>
<form method="get" class="mb-3">
  <div class="input-group">
    <input class="form-control" name="keyword" placeholder="Filter keywords..." value="{{ keyword }}">
    <button class="btn btn-outline-secondary">Filter</button>
  </div>
 </form>
<div id="chart"></div>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script>Plotly.newPlot('chart', JSON.parse('{{ chart_json|safe }}'));</script>

<h4 class="mt-4">Top Hashtags</h4>
<ul class="list-group">
  {% for tag,count in results.top_hashtags[:5] %}
  <li class="list-group-item d-flex justify-content-between align-items-center">
    <a href="?keyword={{ tag.strip('#') }}" class="me-2">{{ tag }}</a> <span class="badge bg-primary">{{ count }}</span>
  </li>
  {% endfor %}
</ul>
<h4 class="mt-4">Top Keywords</h4>
<ul class="list-group">
  {% for k,c in results.top_keywords[:5] %}
  <li class="list-group-item d-flex justify-content-between align-items-center">{{ k }} <span class="badge bg-secondary">{{ c }}</span></li>
  {% endfor %}
</ul>
{% endblock %}
